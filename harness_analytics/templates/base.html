<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Harness analytics{% endblock %}</title>
  <style>
    :root { --bg: #f6f7f9; --card: #fff; --text: #1a1d26; --muted: #5c6578; --accent: #1f3864; --border: #e2e5eb; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; background: var(--bg); color: var(--text); line-height: 1.5; }
    header { background: var(--accent); color: #fff; padding: 0.75rem 1.25rem; }
    header a { color: #fff; text-decoration: none; font-weight: 600; }
    main { max-width: 1100px; margin: 0 auto; padding: 1.25rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
    h1 { font-size: 1.35rem; margin: 0 0 0.5rem; }
    h2 { font-size: 1.1rem; margin: 0 0 0.75rem; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 0.35rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { text-align: left; padding: 0.4rem 0.5rem; border-bottom: 1px solid var(--border); vertical-align: top; }
    th { background: #eef2f8; font-weight: 600; }
    .muted { color: var(--muted); font-size: 0.88rem; }
    a.btn, button { display: inline-block; background: var(--accent); color: #fff !important; padding: 0.45rem 0.9rem; border-radius: 6px; text-decoration: none; font-size: 0.9rem; border: none; cursor: pointer; }
    a.btn.secondary { background: var(--muted); }
    input[type="text"] { padding: 0.45rem 0.6rem; border: 1px solid var(--border); border-radius: 6px; min-width: 220px; }
    pre.xml { max-height: 420px; overflow: auto; background: #1e1e1e; color: #d4d4d4; padding: 1rem; border-radius: 6px; font-size: 0.78rem; white-space: pre-wrap; word-break: break-all; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem 1rem; }
    @media (max-width: 720px) { .grid2 { grid-template-columns: 1fr; } }
    dt { font-weight: 600; color: var(--muted); }
    dd { margin: 0 0 0.5rem 0; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <header>
    <a href="/portal/">Harness analytics portal</a>
    {% if show_sign_out %}
    <span style="float:right;"><a href="/portal/logout" style="font-weight:normal;opacity:0.9;">Sign out</a></span>
    {% endif %}
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
