# https://docs.railway.com/reference/config-as-code
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Runs before the new container starts. Link Postgres and set DATABASE_URL on this service first.
preDeployCommand = "sh -c 'if [ -z \"$DATABASE_URL\" ]; then echo \"preDeploy: skip (no DATABASE_URL)\"; exit 0; fi; python -m harness_analytics init --db-url \"$DATABASE_URL\"'"
healthcheckPath = "/health"
# Cold start imports SQLAlchemy + FastAPI; allow headroom before first successful GET /health
healthcheckTimeout = 180
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# To run the Arq worker as a *second* Railway service, point that service at
# this same Dockerfile and override its start command to:
#     python -m harness_analytics.jobs.worker
# Required env on the worker service: DATABASE_URL, REDIS_URL.
